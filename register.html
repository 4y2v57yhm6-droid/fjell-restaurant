<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Fjell</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo"><span class="logo-text">Fjell</span></div>
            <nav class="nav desktop-nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="login.html" class="nav-link">Вход</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-container">
                    <div class="auth-box">
                        <h2 class="auth-title">Регистрация</h2>
                        <form id="registerForm">
                            <div class="form-group">
                                <label>Имя *</label>
                                <input type="text" id="regName" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" id="regEmail" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>Телефон</label>
                                <input type="tel" id="regPhone" class="form-input" placeholder="+7 (999) 123-45-67">
                            </div>
                            <div class="form-group">
                                <label>Пароль *</label>
                                <input type="password" id="regPassword" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>Подтверждение пароля *</label>
                                <input type="password" id="regConfirmPassword" class="form-input" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
                            <div id="registerMessage" class="form-message"></div>
                        </form>
                        <p class="auth-footer">Уже есть аккаунт? <a href="login.html" class="auth-link">Войти</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
